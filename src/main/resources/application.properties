spring.application.name=gestion_exams

######################################
#   CONFIGURATION SERVEUR
######################################
server.port=${PORT:8081}
server.servlet.context-path=/api/v1

######################################
#   CONFIGURATION BASE DE DONNEES
######################################
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3316}/${MYSQLDATABASE:gestion_examens}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:passwd}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

######################################
#   CONFIGURATION JPA/HIBERNATE
######################################
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=30

# Respecter les headers X-Forwarded-* injectés par le proxy Railway
server.forward-headers-strategy=FRAMEWORK

######################################
#   CONFIGURATION JWT
######################################
app.jwt.secret=${JWT_SECRET:MaCleSecreteTresLonguePourJWT123456789!}
app.jwt.expiration=86400000

######################################
#   LOGS (réduits en production)
######################################
logging.level.org.springframework.context=WARN
logging.level.org.springframework.beans=WARN
logging.level.org.springframework.security=WARN
server.error.include-binding-errors=always
server.error.include-message=always
